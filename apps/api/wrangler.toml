name = "quan-marketing-api"
main = "src/index.ts"
compatibility_date = "2024-05-29"

# Cloudflare D1 Database
[[d1_databases]]
binding = "DB"
database_name = "quan-marketing-db"
database_id = "f2408d93-a90f-4131-89d0-7266d230bb62"

# Cloudflare KV Namespace (cache)
[[kv_namespaces]]
binding = "CACHE"
id = "cd17dd1d58b94ea8afbc33118371c444"

[vars]
ENVIRONMENT = "production"
N8N_WEBHOOK_BASE_URL = ""
ADMIN_USERNAME = "admin"
